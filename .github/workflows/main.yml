name: RDP-Stable-0000

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 # الحد الأقصى لـ GitHub هو 6 ساعات

    steps:
      - name: Configure Windows & Disable Password Complexity
        run: |
          # تعطيل شروط تعقيد كلمة المرور لكي يقبل "0000"
          secedit /export /cfg config.inf
          (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' | Set-Content config.inf
          secedit /configure /db %temp%\temp.sdb /cfg config.inf /areas SECURITYPOLICY
          
          # تفعيل الـ RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

      - name: Create RDP User with Password 0000
        run: |
          $Password = ConvertTo-SecureString "0000" -AsPlainText -Force
          New-LocalUser -Name "RDP_User" -Password $Password -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP_User"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP_User"

      - name: Install and Connect Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner
          
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Keep Alive Loop
        run: |
          Write-Host "========================================"
          Write-Host "IP Address : $env:TS_IP"
          Write-Host "Username   : RDP_User"
          Write-Host "Password   : 0000"
          Write-Host "========================================"
          
          # حلقة التكرار لضمان بقاء الجهاز يعمل
          $i = 0
          while($true) {
            Write-Host "RDP is running... Time elapsed: $i minutes"
            Start-Sleep -Seconds 60
            $i++
          }
