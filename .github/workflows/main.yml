name: RDP-Stable-Mohammad

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 # الحد الأقصى لـ GitHub

    steps:
      - name: Configure Windows Settings
        run: |
          # تفعيل الـ RDP وإعدادات الوصول
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes
          
          # منع الجهاز من الخمول (Sleep)
          powercfg /x -hibernate-timeout-ac 0

      - name: Create RDP User (mohammad2020)
        run: |
          # إنشاء المستخدم وتعيين الباسورد
          net user RDP_User mohammad2020 /add /y
          net localgroup Administrators RDP_User /add
          net localgroup "Remote Desktop Users" RDP_User /add
          
          # جعل الباسورد لا ينتهي أبداً
          wmic useraccount where name='RDP_User' set passwordexpires=false

      - name: Install and Connect Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner
          
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Final Connection Info & Keep Alive
        run: |
          Write-Host "========================================"
          Write-Host "RDP Address: $env:TS_IP"
          Write-Host "Username: RDP_User"
          Write-Host "Password: mohammad2020"
          Write-Host "========================================"
          
          # حلقة البقاء حياً لمنع إغلاق السيرفر
          $i = 0
          while($true) {
            Write-Host "RDP is Active... Time: $(Get-Date)"
            Start-Sleep -Seconds 60
          }
