name: RDP-Stable-Mohammad

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360

    steps:
      - name: Force Disable Password Policy & Create User
        run: |
          # 1. تصدير سياسة الأمان الحالية
          secedit /export /cfg config.inf
          
          # 2. تعديل السياسة لتعطيل التعقيد وطول الباسورد برمجياً
          $config = Get-Content config.inf
          $config = $config -replace "PasswordComplexity = 1", "PasswordComplexity = 0"
          $config = $config -replace "MinimumPasswordLength = .*", "MinimumPasswordLength = 0"
          $config | Set-Content config.inf
          
          # 3. إعادة تطبيق السياسة المعدلة على النظام
          secedit /configure /db $env:temp\temp.sdb /cfg config.inf /areas SECURITYPOLICY
          
          # 4. إنشاء المستخدم باستخدام PowerShell Core (أكثر استقراراً)
          $Password = ConvertTo-SecureString "mohammad2020" -AsPlainText -Force
          New-LocalUser -Name "mohammad_rdp" -Password $Password -Description "RDP User" -AccountNeverExpires
          
          # 5. إضافة الصلاحيات
          Add-LocalGroupMember -Group "Administrators" -Member "mohammad_rdp"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "mohammad_rdp"
          
          # 6. تفعيل الـ RDP
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0
          netsh advfirewall firewall set rule group="remote desktop" new enable=Yes

      - name: Install and Connect Tailscale
        run: |
          Invoke-WebRequest -Uri "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi" -OutFile "tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner
          
          $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Final Connection Info & Keep Alive
        run: |
          Write-Host "========================================"
          Write-Host "RDP Address: $env:TS_IP"
          Write-Host "Username: mohammad_rdp"
          Write-Host "Password: mohammad2020"
          Write-Host "========================================"
          
          $i = 0
          while($true) {
            Write-Host "RDP Active... [$(Get-Date)]"
            Start-Sleep -Seconds 60
          }
