name: RDP-Stable

on:
  workflow_dispatch:

jobs:
  secure-rdp:
    runs-on: windows-latest
    timeout-minutes: 360 # الحد الفعلي لجيتهاب هو 6 ساعات

    steps:
      - name: Configure Core RDP & Disable Password Policy
        run: |
          # تفعيل الـ RDP وتخفيف قيود الحماية للوصول السهل
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server' -Name "fDenyTSConnections" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "UserAuthentication" -Value 0 -Force
          Set-ItemProperty -Path 'HKLM:\System\CurrentControlSet\Control\Terminal Server\WinStations\RDP-Tcp' -Name "SecurityLayer" -Value 0 -Force
          
          # تعطيل جدار الحماية للمنافذ المطلوبة
          netsh advfirewall firewall add rule name="RDP-Allow" dir=in action=allow protocol=TCP localport=3389
          
          # تصدير وتعطيل سياسة تعقيد كلمة المرور
          secedit /export /cfg config.inf
          (Get-Content config.inf) -replace 'PasswordComplexity = 1', 'PasswordComplexity = 0' -replace 'MinimumPasswordLength = .*', 'MinimumPasswordLength = 0' | Set-Content config.inf
          secedit /configure /db $env:temp\temp.sdb /cfg config.inf /areas SECURITYPOLICY

      - name: Create RDP User
        run: |
          # إنشاء المستخدم بالباسورد المطلوب مباشرة
          $password = "mohammad2020"
          $securePass = ConvertTo-SecureString $password -AsPlainText -Force
          $user = New-LocalUser -Name "RDP_User" -Password $securePass -AccountNeverExpires
          Add-LocalGroupMember -Group "Administrators" -Member "RDP_User"
          Add-LocalGroupMember -Group "Remote Desktop Users" -Member "RDP_User"
          
          echo "PASS=mohammad2020" >> $env:GITHUB_ENV

      - name: Install Tailscale
        run: |
          $tsUrl = "https://pkgs.tailscale.com/stable/tailscale-setup-1.82.0-amd64.msi"
          Invoke-WebRequest -Uri $tsUrl -OutFile "tailscale.msi"
          Start-Process msiexec.exe -ArgumentList "/i", "tailscale.msi", "/quiet", "/norestart" -Wait

      - name: Establish Tailscale Connection
        run: |
          # تأكد من تحديث الـ Auth Key في الـ Secrets
          & "C:\Program Files\Tailscale\tailscale.exe" up --authkey=${{ secrets.TAILSCALE_AUTH_KEY }} --hostname=gh-runner --reset
          
          $tsIP = ""
          $timeout = 0
          while (-not $tsIP -and $timeout -lt 12) {
              $tsIP = & "C:\Program Files\Tailscale\tailscale.exe" ip -4
              Start-Sleep -Seconds 5
              $timeout++
          }
          echo "TS_IP=$tsIP" >> $env:GITHUB_ENV

      - name: Maintain Connection
        run: |
          Write-Host "`n=== RDP ACCESS INFO ==="
          Write-Host "Address: $env:TS_IP"
          Write-Host "Username: RDP_User"
          Write-Host "Password: $env:PASS"
          Write-Host "========================`n"
          
          while ($true) {
              Write-Host "[$(Get-Date)] RDP Active - Session expires in 6 hours total"
              Start-Sleep -Seconds 300
          }
